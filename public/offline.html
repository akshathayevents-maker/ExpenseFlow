<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e0f0d">
<title>Offline — ExpenseFlow</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; height: 100dvh;
    background: #0b0d0c;
    color: #f0ede6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
    padding: 24px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    text-align: center;
  }
  .icon {
    font-size: 3.5rem;
    margin-bottom: 24px;
    opacity: .7;
  }
  .brand {
    color: #B8893E;
    font-size: .75rem;
    font-weight: 800;
    letter-spacing: .2em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: #f5ede0;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  p {
    font-size: .9rem;
    color: rgba(240,237,230,.5);
    line-height: 1.6;
    max-width: 300px;
    margin: 0 auto 32px;
  }
  button {
    background: #B8893E;
    border: none;
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: .03em;
    padding: 14px 32px;
    transition: opacity .15s;
    min-width: 180px;
  }
  button:active { opacity: .75; }
  .hint {
    margin-top: 16px;
    font-size: .75rem;
    color: rgba(240,237,230,.3);
  }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <div class="brand">ExpenseFlow</div>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Your work is safe — it's waiting for you.</p>
  <button onclick="window.location.reload()">Retry connection</button>
  <div class="hint">This page is served by the ExpenseFlow service worker.</div>
</body>
</html>

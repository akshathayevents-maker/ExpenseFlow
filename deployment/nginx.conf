# =============================================================================
# ExpenseFlow — Nginx Production Config
# Copy to: /etc/nginx/sites-available/expenseflow
# Enable: ln -s /etc/nginx/sites-available/expenseflow /etc/nginx/sites-enabled/
# Test:   nginx -t
# Reload: systemctl reload nginx
# =============================================================================

# Rate limiting zones
limit_req_zone  $binary_remote_addr  zone=login:10m    rate=5r/m;
limit_req_zone  $binary_remote_addr  zone=api:10m      rate=60r/m;
limit_req_zone  $binary_remote_addr  zone=general:10m  rate=100r/m;
limit_conn_zone $binary_remote_addr  zone=addr:10m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name expenseflow.example.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name expenseflow.example.com;

    root /var/www/expenseflow/current/public;
    index index.php;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/expenseflow.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/expenseflow.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/expenseflow.example.com/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net data:; img-src 'self' data: blob:; connect-src 'self';" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/expenseflow-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/expenseflow-error.log warn;

    # ── Limits & timeouts ─────────────────────────────────────────────────────
    client_max_body_size    15M;
    client_body_timeout     30s;
    client_header_timeout   15s;
    send_timeout            30s;
    keepalive_timeout       65;
    limit_conn addr         50;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        font/woff font/woff2 application/font-woff2;

    # ── Laravel routing ───────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Auth routes — strict rate limit
    location ~ ^/(login|password) {
        limit_req zone=login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.3-fpm-expenseflow.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param HTTPS           on;

        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 10;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         8 128k;
        fastcgi_busy_buffers_size 256k;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # ── Static assets — long cache ─────────────────────────────────────────────
    location ~* \.(css|js|woff|woff2|ttf|otf|eot|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Block bill/receipt downloads to authenticated users only — handled by Laravel
    location ^~ /storage/bills/ {
        try_files $uri /index.php?$query_string;
    }

    # ── Block sensitive paths ─────────────────────────────────────────────────
    location ~ /\.(git|env|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ ^/(vendor|bootstrap/cache|storage/framework|storage/logs) {
        deny all;
        return 404;
    }

    # Block common attack probes
    location ~* \.(sql|bak|log|sh|bash|py|rb|pl|conf|config|ini)$ {
        deny all;
        return 404;
    }

    # Deny xmlrpc and common WordPress probes
    location ~* ^/(xmlrpc\.php|wp-login|wp-admin) {
        deny all;
        return 404;
    }

    # ── Health check endpoint (for load balancer / uptime monitoring) ─────────
    location = /health {
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}

; =============================================================================
; ExpenseFlow — Supervisor Config
; Copy to: /etc/supervisor/conf.d/expenseflow.conf
; Reload:  supervisorctl reread && supervisorctl update
; Status:  supervisorctl status
; =============================================================================

; ── Default queue worker (mail, notifications, general jobs) ─────────────────
[program:expenseflow-worker]
command=/usr/bin/php8.3 /var/www/expenseflow/current/artisan queue:work
    --queue=mail,notifications,default
    --tries=3
    --backoff=60
    --timeout=90
    --memory=256
    --sleep=3
    --max-jobs=1000
    --max-time=3600

process_name=%(program_name)s_%(process_num)02d
numprocs=2
directory=/var/www/expenseflow/current
autostart=true
autorestart=true
startretries=5
startsecs=5
stopwaitsecs=120
stopsignal=TERM
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/expenseflow/shared/storage/logs/worker.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/expenseflow-worker-err.log

; ── OCR / heavy processing worker (separate queue, single process) ────────────
[program:expenseflow-ocr-worker]
command=/usr/bin/php8.3 /var/www/expenseflow/current/artisan queue:work
    --queue=ocr,receipts
    --tries=2
    --backoff=120
    --timeout=300
    --memory=512
    --sleep=5
    --max-jobs=200
    --max-time=3600

process_name=%(program_name)s
numprocs=1
directory=/var/www/expenseflow/current
autostart=true
autorestart=true
startretries=3
startsecs=10
stopwaitsecs=360
stopsignal=TERM
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/expenseflow/shared/storage/logs/ocr-worker.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/expenseflow-ocr-worker-err.log

; ── Group — restart all workers at once via: supervisorctl restart expenseflow: ─
[group:expenseflow]
programs=expenseflow-worker,expenseflow-ocr-worker
priority=999
